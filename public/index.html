<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Talks — Alemmi</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0a0a14;
      color: #e8e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container { max-width: 700px; width: 100%; padding: 48px 24px; }
    h1 {
      font-size: 2.4em;
      font-weight: 900;
      margin-bottom: 12px;
    }
    h1 span {
      background: linear-gradient(135deg, #3b82f6, #8b5cf6, #a855f7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .subtitle { color: #9090b0; margin-bottom: 48px; }
    .talk-list { list-style: none; }
    .talk-list li { margin-bottom: 16px; }
    .talk-list a {
      display: block;
      padding: 24px;
      background: rgba(15, 15, 35, 0.85);
      border: 1px solid rgba(100, 80, 255, 0.2);
      border-radius: 12px;
      text-decoration: none;
      color: #e8e8f0;
      transition: border-color 0.3s, transform 0.3s;
    }
    .talk-list a:hover {
      border-color: rgba(139, 92, 246, 0.5);
      transform: translateY(-2px);
    }
    .talk-title { font-weight: 700; font-size: 1.1em; margin-bottom: 4px; }
    .talk-meta { font-size: 0.8em; color: #9090b0; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Talk<span>s</span></h1>
    <p class="subtitle">Alessandro Mizzaro — Alemmi</p>
    <ul class="talk-list">
      <li>
        <a href="olicyber2026/ai-security/">
          <div class="talk-title">AI &amp; Cybersecurity — Coding Agent Security</div>
          <div class="talk-meta">OliCyber 2026 &bull; April 2026</div>
        </a>
      </li>
    </ul>
  </div>
</body>
</html>
